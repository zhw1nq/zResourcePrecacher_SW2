name: Build and Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build Project
        run: dotnet build --no-restore --configuration Release

      - name: Publish & Package Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          dotnet publish --configuration Release --output ./publish/zResourcePrecacher
          rm -f ./publish/zResourcePrecacher/*.pdb
          rm -f ./publish/zResourcePrecacher/*.deps.json
          cd publish
          zip -r ../zResourcePrecacher.zip zResourcePrecacher

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: zResourcePrecacher.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
